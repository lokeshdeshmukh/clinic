name: Deploy To Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        run: |
          test -n "$FTP_SERVER" || { echo "Missing secret: FTP_SERVER"; exit 1; }
          test -n "$FTP_USERNAME" || { echo "Missing secret: FTP_USERNAME"; exit 1; }
          test -n "$FTP_PASSWORD" || { echo "Missing secret: FTP_PASSWORD"; exit 1; }
          test -n "$FTP_REMOTE_DIR" || { echo "Missing secret: FTP_REMOTE_DIR"; exit 1; }

      - name: Generate build version metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOYED_AT="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          mkdir -p storage
          cat > storage/app_version.json <<EOF
          {
            "version": "0.0.0.${GITHUB_RUN_NUMBER}",
            "commit": "${SHORT_SHA}",
            "deployed_at": "${DEPLOYED_AT}",
            "source": "github-actions"
          }
          EOF

      - name: Deploy files by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/dist/**
            **/.env
            **/storage/installed.lock
            **/storage/logs/**
            !**/storage/logs/.gitkeep
            **/public/uploads/**
            !**/public/uploads/.gitkeep
            **/package-lock.json
            **/package.json
            **/tailwind.config.js

  run-updates:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
    steps:
      - name: Validate deploy hook secret
        run: |
          test -n "$DEPLOY_HOOK_URL" || { echo "Missing secret: DEPLOY_HOOK_URL"; exit 1; }

      - name: Trigger remote migration hook
        run: curl -fsSL -X POST "$DEPLOY_HOOK_URL"
