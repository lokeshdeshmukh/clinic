name: Deploy To Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' && secrets.FTP_REMOTE_DIR != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build version metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOYED_AT="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          mkdir -p storage
          cat > storage/app_version.json <<EOF
          {
            "version": "0.0.0.${GITHUB_RUN_NUMBER}",
            "commit": "${SHORT_SHA}",
            "deployed_at": "${DEPLOYED_AT}",
            "source": "github-actions"
          }
          EOF

      - name: Deploy files by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/dist/**
            **/.env
            **/storage/installed.lock
            **/storage/logs/**
            !**/storage/logs/.gitkeep
            **/public/uploads/**
            !**/public/uploads/.gitkeep
            **/package-lock.json
            **/package.json
            **/tailwind.config.js

  run-updates:
    needs: deploy
    if: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' && secrets.FTP_REMOTE_DIR != '' && secrets.DEPLOY_HOOK_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote migration hook
        run: curl -fsSL -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
